server:
  port: 8083

spring:
  application:
    name: ms-playlists # <--- CAMBIADO AQUÍ (Debe ser idéntico al name de tu @FeignClient)
  datasource:
    url: jdbc:h2:mem:playlistsdb # Cambiado también para que tenga su propia base de datos limpia
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true # Añadido para que puedas auditar las consultas en consola

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/