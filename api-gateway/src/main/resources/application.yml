server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: ms-catalog
          uri: lb://MS-CATALOG
          predicates:
            - Path=/catalog/**
        - id: ms-playlists
          uri: lb://MS-PLAYLISTS
          predicates:
            - Path=/playlists/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/