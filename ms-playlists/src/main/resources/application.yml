server:
  port: 8082

spring:
  application:
    name: ms-playlists
  datasource:
    url: jdbc:h2:mem:playlistsdb
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/